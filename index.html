<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>1 Cinemas WiFi</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .container {
        max-width: 360px;
        width: 100%;
      }
      .logo {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .subtitle {
        color: #888;
        font-size: 14px;
        margin-bottom: 48px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 18px 24px;
        margin: 14px 0;
        border: none;
        border-radius: 14px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-menu {
        background: #e50914;
        color: #ffffff;
      }
      .btn-wifi {
        background: #2a2a3e;
        color: #aaa;
        border: 1px solid #333;
      }
      .note {
        color: #555;
        font-size: 12px;
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">1 Cinemas</div>
      <p class="subtitle">Free WiFi</p>
      <button class="btn btn-menu" id="menuBtn">Open Food &amp; Drinks Menu</button>
      <button class="btn btn-wifi" id="wifiBtn">Just Connect WiFi</button>
      <p class="note">WiFi connects automatically when you open the menu</p>
    </div>

    <!--
  Hidden form for auth submission.
  Using a form (not window.location.href) because:
  - iPhone CNA silently blocks JS navigation from HTTPS to HTTP
  - Form submission bypasses this mixed-content restriction
  - The AP's gwn_login endpoint accepts GET parameters
-->
    <form id="authForm" method="GET" style="display: none">
      <input type="hidden" name="username" value="guest" />
      <input type="hidden" name="password" value="guest" />
      <input type="hidden" name="redirect" value="" />
      <input type="hidden" name="ssid" value="" />
    </form>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var loginUrl = params.get('login_url') || '';
        var ssid = params.get('ssid') || '';
        var ua = navigator.userAgent || '';
        var isAndroid = /android/i.test(ua);

        var menuUrl = 'http://1cinemas.co.in/POP/OrderPortal/start';
        var goUrl = 'https://1cinemas.netlify.app/go.html';

        // Pre-fill form fields
        var form = document.getElementById('authForm');
        form.action = loginUrl;
        form.querySelector('[name=ssid]').value = ssid;

        // Submit auth via form (works in both CNA and Android WebView)
        function submitAuth(redirectTo) {
          form.querySelector('[name=redirect]').value = redirectTo;
          form.submit();
        }

        // OPEN MENU
        document.getElementById('menuBtn').addEventListener('click', function () {
          if (!loginUrl) return;

          if (isAndroid) {
            // Auth inside WebView, AP redirects to go.html after auth
            // go.html fires intent:// to open Chrome with menu
            submitAuth(goUrl);
          } else {
            // iOS: CNA stays open, auth then redirect to menu
            submitAuth(menuUrl);
          }
        });

        // JUST WIFI
        document.getElementById('wifiBtn').addEventListener('click', function () {
          if (!loginUrl) return;
          submitAuth('');
        });
      })();
    </script>
  </body>
</html>
