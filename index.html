<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>1 Cinemas WiFi</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e; color: #ffffff;
        min-height: 100vh; display: flex; align-items: center;
        justify-content: center; text-align: center; padding: 24px;
      }
      .container { max-width: 360px; width: 100%; }
      .logo { font-size: 32px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
      .subtitle { color: #888; font-size: 14px; margin-bottom: 48px; }
      .btn {
        display: block; width: 100%; padding: 18px 24px; margin: 14px 0;
        border: none; border-radius: 14px; font-size: 18px; font-weight: 600;
        cursor: pointer; -webkit-tap-highlight-color: transparent;
        text-decoration: none; text-align: center;
      }
      .btn:active { transform: scale(0.97); }
      .btn-menu { background: #e50914; color: #ffffff; }
      .btn-wifi { background: #2a2a3e; color: #aaa; border: 1px solid #333; }
      .note { color: #555; font-size: 12px; margin-top: 28px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">1 Cinemas</div>
      <p class="subtitle">Free WiFi</p>
      <!-- Native <a> tags — CNA may allow user-tapped links to HTTP URLs
           even though it blocks JS-driven navigation (location.href, form.submit) -->
      <a id="menuBtn" class="btn btn-menu" href="#" target="_blank">Open Food &amp; Drinks Menu</a>
      <a id="wifiBtn" class="btn btn-wifi" href="#" target="_blank">Just Connect WiFi</a>
      <p class="note">WiFi connects automatically when you open the menu</p>
      <div id="debug" style="color:#0f0;font-family:monospace;font-size:12px;margin-top:20px;word-break:break-all;text-align:left;background:#000;padding:12px;border-radius:8px;max-height:50vh;overflow-y:auto;"></div>
    </div>

    <script>
      (function () {
        var dbg = document.getElementById('debug');
        var logN = 0;
        function log(msg) {
          logN++;
          dbg.innerHTML += '<div>' + logN + '. ' + msg + '</div>';
          dbg.scrollTop = dbg.scrollHeight;
        }

        var params = new URLSearchParams(window.location.search);
        var loginUrl = params.get('login_url') || '';
        var ssid = params.get('ssid') || '';
        var apMac = params.get('ap_mac') || '';
        var ua = navigator.userAgent || '';
        var isAndroid = /android/i.test(ua);
        var menuUrl = 'http://1cinemas.co.in/POP/OrderPortal/start';
        var goUrl = 'https://1cinemas.netlify.app/go.html';

        // --- DNS FIX ---
        var apIpMap = {
          'EC-74-D7-27-A5-DC': '10.0.0.148',
          'EC-74-D7-27-A8-C8': '10.0.0.155',
          'EC-74-D7-27-B2-18': '10.0.0.156',
          'EC-74-D7-21-E8-18': '10.0.0.162',
          'EC-74-D7-27-A7-C0': '10.0.0.163',
          'EC-74-D7-27-A5-34': '10.0.0.164'
        };
        var apIp = apIpMap[apMac] || '';
        if (apIp && loginUrl.indexOf('cwp.gwnportal.cloud') !== -1) {
          loginUrl = loginUrl.replace('cwp.gwnportal.cloud', apIp);
          log('<b style="color:cyan">DNS FIX: ' + apMac + ' → ' + apIp + '</b>');
        } else if (!apIp && apMac) {
          log('<b style="color:red">WARNING: ap_mac ' + apMac + ' not in IP map!</b>');
        }

        function buildAuthUrl(redirectTo) {
          if (!loginUrl) return '#';
          return loginUrl +
            '?username=' + encodeURIComponent('guest') +
            '&password=' + encodeURIComponent('guest') +
            '&redirect=' + encodeURIComponent(redirectTo) +
            '&ssid=' + encodeURIComponent(ssid);
        }

        log('isAndroid: <b>' + isAndroid + '</b>');
        log('login_url: <b>' + (loginUrl || 'EMPTY') + '</b>');
        log('ap_mac: ' + (apMac || 'EMPTY'));

        // --- SET HREF DIRECTLY ON <a> TAGS ---
        var menuBtn = document.getElementById('menuBtn');
        var wifiBtn = document.getElementById('wifiBtn');

        if (loginUrl) {
          var menuAuthUrl = buildAuthUrl(isAndroid ? goUrl : menuUrl);
          var wifiAuthUrl = buildAuthUrl('');

          menuBtn.href = menuAuthUrl;
          wifiBtn.href = wifiAuthUrl;

          log('menuBtn href set: ' + menuAuthUrl.substring(0, 80) + '...');
          log('wifiBtn href set: ' + wifiAuthUrl.substring(0, 80) + '...');
        } else {
          log('<b style="color:red">No login_url — buttons disabled</b>');
        }

        log('<b>Ready. Tap a button.</b>');
      })();
    </script>
  </body>
</html>
