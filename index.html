<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>1 Cinemas WiFi</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .container {
        max-width: 360px;
        width: 100%;
      }
      .logo {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .subtitle {
        color: #888;
        font-size: 14px;
        margin-bottom: 48px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 18px 24px;
        margin: 14px 0;
        border: none;
        border-radius: 14px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-menu {
        background: #e50914;
        color: #ffffff;
      }
      .btn-wifi {
        background: #2a2a3e;
        color: #aaa;
        border: 1px solid #333;
      }
      .note {
        color: #555;
        font-size: 12px;
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">1 Cinemas</div>
      <p class="subtitle">Free WiFi</p>
      <button class="btn btn-menu" id="menuBtn">Open Food &amp; Drinks Menu</button>
      <button class="btn btn-wifi" id="wifiBtn">Just Connect WiFi</button>
      <p class="note">WiFi connects automatically when you open the menu</p>
      <div id="debug" style="color:#0f0;font-family:monospace;font-size:12px;margin-top:20px;word-break:break-all;text-align:left;background:#000;padding:12px;border-radius:8px;max-height:50vh;overflow-y:auto;"></div>
    </div>

    <script>
      (function () {
        var dbg = document.getElementById('debug');
        var logN = 0;
        function log(msg) {
          logN++;
          dbg.innerHTML += '<div>' + logN + '. ' + msg + '</div>';
          dbg.scrollTop = dbg.scrollHeight;
        }

        // 1. Parse all params
        var rawSearch = window.location.search;
        var params = new URLSearchParams(rawSearch);
        var loginUrl = params.get('login_url') || '';
        var ssid = params.get('ssid') || '';
        var apMac = params.get('ap_mac') || '';
        var clientMac = params.get('client_mac') || '';
        var ua = navigator.userAgent || '';
        var isAndroid = /android/i.test(ua);
        var menuUrl = 'http://1cinemas.co.in/POP/OrderPortal/start';

        log('UA: ' + ua);
        log('isAndroid: <b>' + isAndroid + '</b>');
        log('login_url: <b>' + (loginUrl || 'EMPTY!') + '</b>');
        log('ssid: ' + (ssid || 'EMPTY'));
        log('ap_mac: ' + (apMac || 'EMPTY'));
        log('client_mac: ' + (clientMac || 'EMPTY'));
        log('raw search (' + rawSearch.length + ' chars): ' + rawSearch.substring(0, 200));

        function buildAuthUrl(redirectTo) {
          if (!loginUrl) return '';
          return (
            loginUrl +
            '?username=' + encodeURIComponent('guest') +
            '&password=' + encodeURIComponent('guest') +
            '&redirect=' + encodeURIComponent(redirectTo) +
            '&ssid=' + encodeURIComponent(ssid)
          );
        }

        // OPEN MENU
        document.getElementById('menuBtn').addEventListener('click', function () {
          log('<b>--- MENU BUTTON CLICKED ---</b>');

          if (!loginUrl) {
            log('<b style="color:red">ABORT: login_url is empty!</b>');
            return;
          }

          var authUrl = buildAuthUrl(menuUrl);
          log('authUrl: ' + authUrl);

          if (isAndroid) {
            // Build intent URL
            var intentUrl = '';
            try {
              var u = new URL(authUrl);
              intentUrl = 'intent://' + u.host + u.pathname + u.search +
                '#Intent;scheme=' + u.protocol.replace(':', '') +
                ';package=com.android.chrome;end';
              log('intentUrl: ' + intentUrl.substring(0, 120) + '...');
            } catch (e) {
              log('<b style="color:red">URL parse error: ' + e.message + '</b>');
            }

            // --- TRY 1: intent via <a> click ---
            if (intentUrl) {
              try {
                log('TRY 1: creating &lt;a&gt; with intent href and clicking...');
                var a = document.createElement('a');
                a.href = intentUrl;
                document.body.appendChild(a);
                a.click();
                log('TRY 1: a.click() executed');
              } catch (e) {
                log('<b style="color:red">TRY 1 error: ' + e.message + '</b>');
              }
            }

            // --- TRY 2: window.location.href = intent ---
            setTimeout(function () {
              log('TRY 2: window.location.href = intent...');
              try {
                window.location.href = intentUrl;
                log('TRY 2: assigned');
              } catch (e) {
                log('<b style="color:red">TRY 2 error: ' + e.message + '</b>');
              }
            }, 500);

            // --- TRY 3: window.open with auth URL ---
            setTimeout(function () {
              log('TRY 3: window.open(authUrl, _blank)...');
              try {
                var w = window.open(authUrl, '_blank');
                log('TRY 3: window.open returned: ' + (w ? 'window object' : 'null/blocked'));
              } catch (e) {
                log('<b style="color:red">TRY 3 error: ' + e.message + '</b>');
              }
            }, 1200);

            // --- TRY 4: window.location.href = auth URL (old approach) ---
            setTimeout(function () {
              log('TRY 4: window.location.href = authUrl (direct nav)...');
              window.location.href = authUrl;
            }, 2500);

          } else {
            // non-Android: direct redirect to auth
            log('Non-Android: redirecting to authUrl...');
            window.location.href = authUrl;
          }
        });

        // JUST WIFI
        document.getElementById('wifiBtn').addEventListener('click', function () {
          log('<b>--- WIFI BUTTON CLICKED ---</b>');
          if (!loginUrl) {
            log('<b style="color:red">ABORT: login_url is empty!</b>');
            return;
          }
          var url = buildAuthUrl('');
          log('Navigating to: ' + url);
          window.location.href = url;
        });

        log('<b>Ready. Tap a button.</b>');
      })();
    </script>
  </body>
</html>
