<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // This page loads AFTER the AP has authenticated the user.
      // MAC is already whitelisted. Internet works.
      // Fire intent INSTANTLY to open Chrome with the menu.
      var ua = navigator.userAgent || '';
      if (/android/i.test(ua)) {
        window.location.replace(
          'intent://1cinemas.co.in/POP/OrderPortal/start#Intent;scheme=http;package=com.android.chrome;end',
        );
      } else {
        window.location.replace('http://1cinemas.co.in/POP/OrderPortal/start');
      }
    </script>
  </head>
  <body></body>
</html>
